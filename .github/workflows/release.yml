name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, for example v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Resolve tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Extract release notes
        id: notes
        run: |
          VERSION="${{ steps.tag.outputs.tag }}"
          VERSION_NUM="${VERSION#v}"
          NOTES=""
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk -v ver="$VERSION_NUM" '
              /^## / { if (found) exit; if ($2 == ver) { found=1; next } }
              found { print }
            ' CHANGELOG.md)
          fi
          if [ -z "$NOTES" ]; then NOTES="Release $VERSION"; fi
          {
            echo 'notes<<EOF'
            printf '%s\n' "$NOTES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: true
          body: ${{ steps.notes.outputs.notes }}

  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            platform: windows-latest
            args: "--no-bundle"
            wcx_triple: x86_64-pc-windows-msvc
          - name: macOS Apple Silicon
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
            wcx_triple: aarch64-apple-darwin
          - name: macOS Intel
            platform: macos-latest
            args: "--target x86_64-apple-darwin"
            wcx_triple: x86_64-apple-darwin
          - name: Linux
            platform: ubuntu-22.04
            args: ""
            wcx_triple: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.tag }}
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wcx sidecar
        shell: bash
        run: |
          if [[ "${{ matrix.wcx_triple }}" == "x86_64-apple-darwin" && "$(uname -m)" == "arm64" ]]; then
            # Cross-build x86_64 on arm64 macOS via Rosetta
            arch -x86_64 bash scripts/build-wcx-sidecar.sh "${{ matrix.wcx_triple }}"
          else
            bash scripts/build-wcx-sidecar.sh "${{ matrix.wcx_triple }}"
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and upload Windows executable
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WXMP_ACTIVATION_SECRET: ${{ secrets.WXMP_ACTIVATION_SECRET }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_LOVSTUDIO_SITE_URL: ${{ secrets.VITE_LOVSTUDIO_SITE_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          bun tauri build ${{ matrix.args }}
          $tag = "${{ needs.create-release.outputs.tag }}"
          $asset = "wxmp-cracker-app-$tag-windows-x64.zip"
          $exe = "src-tauri\target\release\wxmp-cracker.exe"
          if (!(Test-Path $exe)) {
            throw "Expected Windows executable not found: $exe"
          }
          Compress-Archive -Path $exe -DestinationPath $asset -Force
          gh release upload $tag $asset --repo "$env:GITHUB_REPOSITORY" --clobber

      - name: Build and upload Linux app bundles
        if: matrix.platform == 'ubuntu-22.04'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WXMP_ACTIVATION_SECRET: ${{ secrets.WXMP_ACTIVATION_SECRET }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_LOVSTUDIO_SITE_URL: ${{ secrets.VITE_LOVSTUDIO_SITE_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
          assetNamePattern: "wxmp-cracker-app-[version]-[platform]-[arch][ext]"
          includeUpdaterJson: true

      - name: Build, sign, notarize, and upload macOS app bundles
        if: matrix.platform == 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WXMP_ACTIVATION_SECRET: ${{ secrets.WXMP_ACTIVATION_SECRET }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_LOVSTUDIO_SITE_URL: ${{ secrets.VITE_LOVSTUDIO_SITE_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
          assetNamePattern: "wxmp-cracker-app-[version]-[platform]-[arch][ext]"
          includeUpdaterJson: true

  publish-release:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.create-release.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --draft=false
